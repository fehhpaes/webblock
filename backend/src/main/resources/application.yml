spring:
  application:
    name: backend

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/securitysaas}
      
  threads:
    virtual:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:5B32A9C0Z1234567890ABCDEF1234567890ABCDEF1234567890ABCDEF1234567}
    admin-expiration: 7200000
    agent-expiration: 31536000000
    
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

server:
  port: ${PORT:8080}
